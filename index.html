<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITC Yard Monitoring - Input</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d1117;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #58a6ff;
            --success: #238636;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #c9d1d9;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            align-self: start;
            margin-top: 20px;
        }

        h2 { text-align: center; color: white; font-weight: 700; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #8b949e; }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-auth { background: #ffffff; color: #000; }
        .btn-save { background: var(--success); color: white; }
        .btn-sync { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        button:active { transform: scale(0.98); }

        .status-area {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
            font-size: 0.8rem;
        }

        #localCount { font-weight: bold; color: var(--accent); }
        .loader { color: var(--accent); font-style: italic; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>YARD MONITOR</h2>
    
    <div id="auth-section">
        <p style="text-align: center; font-size: 0.9rem; margin-bottom: 20px;">Silahkan login untuk sinkronisasi ke Spreadsheet.</p>
        <button class="btn-auth" onclick="handleAuthClick()">Login Google</button>
    </div>

    <div id="form-section" style="display:none;">
        <div class="input-group">
            <label>Nomor Unit / Item</label>
            <input type="text" id="unitName" placeholder="Masukkan nama unit...">
        </div>
        <div class="input-group">
            <label>Status / Keterangan</label>
            <input type="text" id="keterangan" placeholder="Contoh: Washing, PDI, Ready...">
        </div>
        
        <button class="btn-save" onclick="saveData()">Simpan ke HP</button>
        <button class="btn-sync" onclick="syncData()">Sinkronkan ke Cloud</button>
    </div>

    <div class="status-area">
        <div id="status-text">Antrean Lokal: <span id="localCount">0</span> unit</div>
        <div id="loader" class="loader">Proses Sinkronisasi...</div>
    </div>
</div>

<script>
    // --- KONFIGURASI SESUAI DATA ANDA ---
    const CLIENT_ID = '178166469747-8h708mugebsmfcqm1np97ln8kvflc2qu.apps.googleusercontent.com';
    const SPREADSHEET_ID = '1oymMo6WnoRAoFEY-V2cwe4OF5hBaibg1atgxyWn5Z2k';
    const SHEET_NAME = 'Master Data per unit'; // Nama Tab sesuai permintaan
    const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
    
    let accessToken = null;
    let tokenClient;

    // --- DATABASE LOKAL (DEXIE) ---
    const db = new Dexie("ITC_Yard_DB");
    db.version(1).stores({
        queue: '++id, unit, ket, time'
    });

    // --- INISIALISASI ---
    window.onload = () => {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                accessToken = tokenResponse.access_token;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
                updateUI();
            },
        });
        updateUI();
    };

    function handleAuthClick() {
        tokenClient.requestAccessToken({prompt: 'none'}); 
    }

    // --- SIMPAN KE MEMORI HP ---
    async function saveData() {
        const unit = document.getElementById('unitName').value;
        const ket = document.getElementById('keterangan').value;

        if (!unit) return alert("Nomor Unit wajib diisi!");

        await db.queue.add({
            unit: unit,
            ket: ket,
            time: new Date().toLocaleString('id-ID')
        });

        document.getElementById('unitName').value = "";
        document.getElementById('keterangan').value = "";
        updateUI();
        alert("Data tersimpan di antrean lokal.");
    }

    async function updateUI() {
        const count = await db.queue.count();
        document.getElementById('localCount').innerText = count;
    }

    // --- KIRIM KE GOOGLE SPREADSHEET ---
    async function syncData() {
        if (!accessToken) {
            alert("Sesi habis. Silahkan login kembali.");
            return handleAuthClick();
        }
        
        const allData = await db.queue.toArray();
        if (allData.length === 0) return alert("Tidak ada data untuk dikirim.");

        document.getElementById('loader').style.display = 'block';
        let successCount = 0;

        for (const item of allData) {
            try {
                // Menentukan range ke tab 'Master Data per unit'
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/'${SHEET_NAME}'!A1:append?valueInputOption=USER_ENTERED`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        values: [[item.time, item.unit, item.ket]]
                    })
                });

                if (response.ok) {
                    await db.queue.delete(item.id);
                    successCount++;
                }
            } catch (err) {
                console.error("Gagal mengirim ID:", item.id);
            }
        }

        document.getElementById('loader').style.display = 'none';
        updateUI();
        if (successCount > 0) {
            alert(`${successCount} data berhasil disinkronkan ke Spreadsheet!`);
        } else {
            alert("Sinkronisasi gagal. Periksa koneksi internet.");
        }
    }
</script>
</body>
</html>
